[profile.default]
solc = "0.8.24"
src = "src"
out = "out"
libs = ["lib"]
remappings = ['@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/']

# Kích hoạt trình tối ưu hóa
optimizer = true
optimizer_runs = 200
viaIR = true

# Cấu hình chuẩn để ép Yul xử lý lỗi sập Stack (Không dùng block rời)
[profile.default.solc_settings.settings.optimizer]
enabled = true
details = { yulDetails = { stackAllocation = true } }

#ffi
ffi = true
